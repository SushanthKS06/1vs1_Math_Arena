name: Mobile CI

on:
  push:
    branches: ["main"]
    paths:
      - "mobile/MathArena/**"
  pull_request:
    branches: ["main"]
    paths:
      - "mobile/MathArena/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile/MathArena

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/MathArena/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript validation (Type Check)
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true # Allow lint failures to not break the pipeline initially


    # Optional: Build the app using EAS (requires EXPO_TOKEN setup in secrets)
    # - name: Publish to Expo EAS
    #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    #   run: eas update --branch main --message "Automated update from CI"
