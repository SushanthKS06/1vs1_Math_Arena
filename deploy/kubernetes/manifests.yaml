apiVersion: v1
kind: Namespace
metadata:
  name: math-arena
  labels:
    app: math-arena
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: math-arena-config
  namespace: math-arena
data:
  SERVER_PORT: "8080"
  REDIS_ADDR: "redis-service:6379"
  TOTAL_ROUNDS: "10"
  ROUND_DURATION_SEC: "10"
  COUNTDOWN_SECONDS: "3"
  GRACE_PERIOD_SEC: "30"
  MAX_MESSAGES_PER_SEC: "20"
  MAX_QUEUE_ACTIONS_PER_MIN: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: math-arena-secrets
  namespace: math-arena
type: Opaque
stringData:
  JWT_SECRET: "your-production-jwt-secret-change-me"
  REDIS_PASSWORD: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: math-arena-backend
  namespace: math-arena
  labels:
    app: math-arena
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: math-arena
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: math-arena
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 120  # Long grace for active games
      containers:
      - name: backend
        image: math-arena-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: math-arena-config
        - secretRef:
            name: math-arena-secrets
        env:
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        lifecycle:
          preStop:
            exec:
              # Signal graceful shutdown and wait for games to complete
              command: ["/bin/sh", "-c", "sleep 60"]
---
apiVersion: v1
kind: Service
metadata:
  name: math-arena-service
  namespace: math-arena
  labels:
    app: math-arena
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: math-arena
    component: backend
  sessionAffinity: ClientIP  # Sticky sessions for WebSocket
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: math-arena-hpa
  namespace: math-arena
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: math-arena-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: matharena_active_games
      target:
        type: AverageValue
        averageValue: "100"  # Scale when avg > 100 games per pod
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60  # Scale down 1 pod per minute max
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 4
        periodSeconds: 60  # Scale up 4 pods per minute max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: math-arena-pdb
  namespace: math-arena
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: math-arena
      component: backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: math-arena-ingress
  namespace: math-arena
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/websocket-services: "math-arena-service"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - api.matharena.example.com
    secretName: math-arena-tls
  rules:
  - host: api.matharena.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: math-arena-service
            port:
              number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: math-arena
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - redis-server
        - --appendonly
        - "yes"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: math-arena
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
